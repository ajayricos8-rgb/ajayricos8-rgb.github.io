<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajayricos 8 RGB Trading</title>
    <script src="https://dforge.site/assets/js/main.js"></script>
    <style>
        body { background-color: #0e1016; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #app { text-align: center; border: 1px solid #2c3e50; padding: 30px; border-radius: 15px; background: #1a1d26; width: 80%; max-width: 400px; }
        .btn { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; display: none; width: 100%; }
        #status { font-weight: bold; color: #f1c40f; }
        .error-log { font-size: 10px; color: #e74c3c; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status">Scanning Engine...</div>
        <div id="log" class="error-log"></div>
        <button id="forceBtn" class="btn" onclick="location.reload()">Refresh Page</button>
    </div>

    <script>
        const config = {
            "serverUrl": "wss://ws.derivws.com/websockets/v3",
            "siteName": "Ajayricos 8 RGB",
            "appId": "132595" 
        };

        function startEngine() {
            try {
                if (typeof DForge !== 'undefined') {
                    document.getElementById('status').innerHTML = "🟢 Connecting to Deriv...";
                    DForge.init(config);
                } else {
                    throw new Error("DForge Library not detected.");
                }
            } catch (e) {
                document.getElementById('status').innerHTML = "🔴 Engine Load Failed";
                document.getElementById('log').innerHTML = e.message;
                document.getElementById('forceBtn').style.display = "block";
            }
        }

        // Wait for page load, then try to start
        window.addEventListener('load', () => {
            setTimeout(startEngine, 2000); 
        });
    </script>
</body>
</html>
