<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajayricos 8 RGB Trading</title>
    <script src="https://dforge.site/assets/js/main.js"></script>
    <style>
        body { background-color: #0e1016; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #app { text-align: center; padding: 20px; }
        .btn { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="status">Initializing Platform...</div>
        <button id="forceBtn" class="btn" onclick="manualStart()">Launch Manually</button>
    </div>

    <script>
        const config = {
            "serverUrl": "wss://ws.derivws.com/websockets/v3",
            "siteName": "Ajayricos 8 RGB",
            "appId": "132595",
            "tradingEngine": "v1"
        };

        function manualStart() {
            if (window.DForge) {
                DForge.init(config);
            } else {
                alert("Engine still loading, please wait 5 seconds.");
            }
        }

        window.onload = function() {
            setTimeout(() => {
                if (window.DForge) {
                    DForge.init(config);
                    document.getElementById('status').innerHTML = "Connecting...";
                } else {
                    document.getElementById('status').innerHTML = "Network slow...";
                    document.getElementById('forceBtn').style.display = "inline-block";
                }
            }, 3000);
        };
    </script>
</body>
</html>
